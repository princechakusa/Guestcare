<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuestCare Command</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
<div class="sb-overlay" id="sbOverlay"></div>
<div class="toast" id="toast"></div>

<!-- Login Modal (Real Authentication) -->
<div class="modal-wrap" id="loginModal" style="display:none">
  <div class="modal-box">
    <div class="modal-title">Sign in to GuestCare</div>
    <div class="form-group">
      <label class="field-label">Email</label>
      <input class="input" type="email" id="loginEmail" placeholder="your@email.com" value="agent@test.com">
    </div>
    <div class="form-group">
      <label class="field-label">Password</label>
      <input class="input" type="password" id="loginPassword" placeholder="••••••••" value="123456">
    </div>
    <div id="loginError" style="font-size:10px;color:var(--red);min-height:14px;margin-bottom:8px"></div>
    <div class="modal-actions">
      <button class="btn" id="loginCancel">Cancel</button>
      <button class="btn btn-primary" id="loginSubmit">Sign In</button>
    </div>
    <div class="text-muted" style="margin-top:12px;text-align:center">
      Demo: agent@test.com / 123456
    </div>
  </div>
</div>

<!-- User Management Modal (for logged-in users) -->
<div class="modal-wrap" id="userModal" style="display:none">
  <div class="modal-box wide">
    <div class="modal-title">User management</div>
    <div id="userList"></div>
    <div class="divider"></div>
    <div id="addUserForm" style="display:none">
      <div style="font-size:11px;color:var(--text);margin-bottom:10px">Add new user</div>
      <div class="form-group"><label class="field-label">Full name</label><input class="input" id="nu_name" placeholder="e.g. Sara Lopez"></div>
      <div class="form-row">
        <div class="form-group"><label class="field-label">Username</label><input class="input" id="nu_user" placeholder="saral"></div>
        <div class="form-group"><label class="field-label">Role</label><select class="select" id="nu_role"><option>Agent</option><option>Supervisor</option><option>Admin</option></select></div>
      </div>
      <div class="form-group"><label class="field-label">Email</label><input class="input" id="nu_email" placeholder="sara@harare.com"></div>
      <div class="form-group"><label class="field-label">Password</label><input class="input" type="password" id="nu_pass" placeholder="••••••••"></div>
      <div id="nuErr" style="font-size:10px;color:var(--red);min-height:14px"></div>
      <div class="modal-actions" style="margin-top:0">
        <button class="btn" id="cancelAdd">Cancel</button>
        <button class="btn btn-primary" id="saveAdd">Save user</button>
      </div>
    </div>
    <div id="editUserForm" style="display:none">
      <div style="font-size:11px;color:var(--text);margin-bottom:10px">Edit user</div>
      <input type="hidden" id="eu_id">
      <div class="form-group"><label class="field-label">Full name</label><input class="input" id="eu_name"></div>
      <div class="form-row">
        <div class="form-group"><label class="field-label">Username</label><input class="input" id="eu_user"></div>
        <div class="form-group"><label class="field-label">Role</label><select class="select" id="eu_role"><option>Agent</option><option>Supervisor</option><option>Admin</option></select></div>
      </div>
      <div class="form-group"><label class="field-label">Email</label><input class="input" id="eu_email"></div>
      <div class="modal-actions" style="margin-top:0">
        <button class="btn" id="cancelEdit">Cancel</button>
        <button class="btn btn-primary" id="saveEdit">Save changes</button>
      </div>
    </div>
    <div id="showAddBtn" style="margin-top:4px"><button class="btn" id="openAdd">+ Add new user</button></div>
    <div class="modal-actions">
      <button class="btn" id="closeUserModal">Close</button>
      <button class="btn btn-danger" id="logoutBtn">Logout</button>
    </div>
  </div>
</div>

<!-- Add / Edit Agent Modal -->
<div class="modal-wrap" id="agentModal" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="agentModalTitle">Add agent</div>
    <input type="hidden" id="ag_id">
    <div class="form-group"><label class="field-label">Full name</label><input class="input" id="ag_name" placeholder="e.g. Kudzanayi Moyo"></div>
    <div class="form-row">
      <div class="form-group"><label class="field-label">Role</label><select class="select" id="ag_role"><option>Guest Experience Agent</option><option>Supervisor</option><option>Team Lead</option><option>Manager</option></select></div>
      <div class="form-group"><label class="field-label">Colour</label><select class="select" id="ag_color"><option value="#2563eb">Blue</option><option value="#16a34a">Green</option><option value="#d97706">Amber</option><option value="#dc2626">Red</option><option value="#7c3aed">Purple</option><option value="#0891b2">Cyan</option></select></div>
    </div>
    <div class="form-group"><label class="field-label">WhatsApp display name</label><input class="input" id="ag_waname" placeholder="e.g. Harare Kudzanayi"></div>
    <div class="form-group"><label class="field-label">Email</label><input class="input" id="ag_email" placeholder="kud@harare.com"></div>
    <div id="agErr" style="font-size:10px;color:var(--red);min-height:14px"></div>
    <div class="modal-actions">
      <button class="btn" id="cancelAgent">Cancel</button>
      <button class="btn btn-primary" id="saveAgent">Save agent</button>
    </div>
  </div>
</div>

<div class="shell">
<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-brand">
    <div><div class="sb-brand-name">GuestCare<span class="sb-brand-dot"></span></div><div class="sb-brand-sub">Holiday · Operations Suite</div></div>
    <button class="sb-close" id="sbClose">✕</button>
  </div>
  <nav class="sb-nav">
    <button class="sb-item" data-view="overview"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Overview</button>
    <button class="sb-item" data-view="agents"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="3"/><path d="M1 14c0-2.8 2.2-5 5-5"/><circle cx="12" cy="10" r="3"/><path d="M9 16c0-1.7 1.3-3 3-3"/></svg>Agents</button>
    <button class="sb-item" data-view="import"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 12h10v2H3z"/></svg>Import data</button>
    <div class="sb-label">Analysis</div>
    <button class="sb-parent sb-item" data-parent="response">
      <span class="sb-pl"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l2.5 1.5"/></svg>Response times</span>
      <svg class="sb-chev" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
    </button>
    <div class="sb-kids" id="ch-response">
      <button class="sb-kid" data-view="r-first">First response</button>
      <button class="sb-kid" data-view="r-avg">Avg response</button>
      <button class="sb-kid" data-view="r-delays">Delays</button>
      <button class="sb-kid" data-view="r-missed">Missed</button>
      <button class="sb-kid" data-view="root-cause">Root cause</button>
    </div>
    <button class="sb-parent sb-item" data-parent="sat">
      <span class="sb-pl"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M5.5 9.5s.8 1.5 2.5 1.5 2.5-1.5 2.5-1.5"/><circle cx="5.5" cy="7" r=".6" fill="currentColor"/><circle cx="10.5" cy="7" r=".6" fill="currentColor"/></svg>Satisfaction</span>
      <svg class="sb-chev" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
    </button>
    <div class="sb-kids" id="ch-sat">
      <button class="sb-kid" data-view="sat-reviews">Reviews</button>
      <button class="sb-kid" data-view="sat-complaints">Complaints</button>
      <button class="sb-kid" data-view="sat-nps">NPS / CSAT</button>
      <button class="sb-kid" data-view="sat-repeat">Repeat guests</button>
      <button class="sb-kid" data-view="sat-resolution">Resolution</button>
    </div>
    <button class="sb-parent sb-item" data-parent="ops">
      <span class="sb-pl"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h5"/></svg>Operations</span>
      <svg class="sb-chev" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
    </button>
    <div class="sb-kids" id="ch-ops">
      <button class="sb-kid" data-view="ops-closed">Tickets closed</button>
      <button class="sb-kid" data-view="ops-active">Active issues</button>
      <button class="sb-kid" data-view="ops-escalations">Escalations</button>
      <button class="sb-kid" data-view="ops-maintenance">Maintenance</button>
      <button class="sb-kid" data-view="ops-inspections">Inspections</button>
      <button class="sb-kid" data-view="ops-deepclean">Deep cleaning</button>
    </div>
    <button class="sb-parent sb-item" data-parent="greviews">
      <span class="sb-pl"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2l1.2 3.6H13l-3 2.2 1.1 3.5L8 9.2l-3.1 2.1 1.1-3.5-3-2.2h3.8z"/></svg>Guest reviews</span>
      <svg class="sb-chev" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
    </button>
    <div class="sb-kids" id="ch-greviews">
      <button class="sb-kid" data-view="gr-properties">Properties</button>
      <button class="sb-kid" data-view="gr-analysis">Analysis</button>
      <button class="sb-kid" data-view="gr-reviews">Reviews</button>
      <button class="sb-kid" data-view="gr-import">Import CSV</button>
    </div>
    <button class="sb-parent sb-item" data-parent="chan">
      <span class="sb-pl"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="4" r="2"/><circle cx="4" cy="8" r="2"/><circle cx="12" cy="12" r="2"/><path d="M6 7l4-2M6 9l4 2"/></svg>Channel intel</span>
      <svg class="sb-chev" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
    </button>
    <div class="sb-kids" id="ch-chan">
      <button class="sb-kid" data-view="chan-airbnb">Airbnb</button>
      <button class="sb-kid" data-view="chan-booking">Booking.com</button>
      <button class="sb-kid" data-view="chan-direct">Direct</button>
    </div>
    <button class="sb-parent sb-item" data-parent="pro">
      <span class="sb-pl"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2C8 2 3 4 3 8v3l1 1h8l1-1V8C13 4 8 2 8 2z"/><path d="M6 12v1a2 2 0 004 0v-1"/></svg>Proactive</span>
      <svg class="sb-chev" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
    </button>
    <div class="sb-kids" id="ch-pro">
      <button class="sb-kid" data-view="pro-prearrival">Pre-arrival</button>
      <button class="sb-kid" data-view="pro-midstay">Mid-stay</button>
    </div>
    <div class="sb-label">System</div>
    <button class="sb-item" data-view="heatmap"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="3" height="3" rx=".5"/><rect x="6" y="1" width="3" height="3" rx=".5"/><rect x="11" y="1" width="3" height="3" rx=".5"/><rect x="1" y="6" width="3" height="3" rx=".5"/><rect x="6" y="6" width="3" height="3" rx=".5"/><rect x="11" y="6" width="3" height="3" rx=".5"/><rect x="1" y="11" width="3" height="3" rx=".5"/><rect x="6" y="11" width="3" height="3" rx=".5"/><rect x="11" y="11" width="3" height="3" rx=".5"/></svg>Response heatmap</button>
    <button class="sb-item" data-view="sentiment"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M5.5 9.5s.8 1.5 2.5 1.5 2.5-1.5 2.5-1.5"/><circle cx="5.5" cy="7" r=".6" fill="currentColor"/><circle cx="10.5" cy="7" r=".6" fill="currentColor"/></svg>Guest sentiment</button>
    <button class="sb-item" data-view="integrations"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="6" height="4" rx="1"/><rect x="9" y="8" width="6" height="4" rx="1"/><path d="M7 6h2v4H7"/></svg>Integrations</button>
    <button class="sb-item" data-view="admin"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2l1.5 3h3l-2.4 1.8.9 3L8 8.2l-3 1.6.9-3L3.5 5h3z"/></svg>Admin</button>
    <button class="sb-item" data-view="help"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M6.5 6a1.5 1.5 0 013 0c0 1-1.5 1.5-1.5 2.5"/><circle cx="8" cy="11.5" r=".5" fill="currentColor"/></svg>Help</button>
  </nav>
  <div class="sb-footer">
    <div class="sb-user" id="profileBtn">
      <div class="sb-ava" id="userAvatar">PC</div>
      <div>
        <div class="sb-uname" id="userDisplayName">Prince Chakusa</div>
        <div class="sb-urole" id="userDisplayRole">Click to sign in</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="mob-bar">
    <button class="mob-menu" id="mobMenu"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/></svg></button>
    <span class="mob-title" id="mobTitle">Overview</span>
  </div>
  <div class="topbar">
    <button class="topbar-menu" id="topMenu"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/></svg></button>
    <div class="topbar-title" id="topTitle">Overview</div>
    <div class="topbar-sep"></div>
    <span class="text-muted" style="letter-spacing:.02em">Holiday</span>
    <div class="topbar-right">
      <div class="conn"><span class="status-dot on"></span>WhatsApp</div>
      <div class="conn"><span class="status-dot on"></span>Hostaway</div>
      <div id="sbPill"><span class="pill p-gray">Local Storage</span></div>
      <div class="clock" id="liveClock"></div>
    </div>
  </div>
  <div class="filter-bar" id="filterBar">
    <select class="select" id="filterAgent" title="Filter by agent">
      <option value="">All agents</option>
    </select>
    <select class="select" id="filterPeriod">
      <option value="all">All time</option>
      <option value="today">Today</option>
      <option value="7">Last 7 days</option>
      <option value="30" selected>Last 30 days</option>
      <option value="90">Last 90 days</option>
    </select>
    <select class="select" id="filterChannel">
      <option value="">All channels</option>
      <option value="WhatsApp">WhatsApp</option>
      <option value="Hostaway">Hostaway</option>
    </select>
    <div class="search-wrap">
      <svg class="search-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
      <input class="input" id="filterSearch" placeholder="Search guest name…" style="font-size:11px;">
    </div>
    <button class="btn" id="filterReset">Reset</button>
    <span class="text-muted" id="filterCount" style="margin-left:4px;"></span>
  </div>
  <div class="content" id="content">Loading…</div>
</div>
</div>

<script src="auth.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
