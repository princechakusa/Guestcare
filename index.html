<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuestCare Command</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f8fa;--bg3:#f0f2f5;
  --border:#e4e6ea;--border2:#d0d3d9;
  --text:#1c2230;--text2:#6b7280;--text3:#9ca3af;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;
  --green:#16a34a;--green-bg:#f0fdf4;
  --sw:224px;--font:'DM Sans',sans-serif
}
html,body{height:100%;font-family:var(--font);font-size:12px;color:var(--text);background:var(--bg2);line-height:1.5;font-weight:400;-webkit-font-smoothing:antialiased}

/* Layout */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;z-index:30}
.main{flex:1;overflow-y:auto;min-width:0}

/* Sidebar */
.sb-brand{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.sb-brand-name{font-size:13px;color:var(--text);letter-spacing:-.01em}
.sb-brand-sub{font-size:10px;color:var(--text3);margin-top:1px}
.sb-close{display:none;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 4px;line-height:1}
.sb-nav{padding:6px 0;flex:1}
.sb-label{font-size:10px;color:var(--text3);padding:10px 16px 3px;letter-spacing:.04em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:8px;padding:5px 16px;font-size:12px;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent}
.sb-item:hover{background:var(--bg2);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent);border-left-color:var(--accent)}
.sb-item.parent-active{color:var(--text)}
.sb-item svg{width:13px;height:13px;flex-shrink:0;opacity:.55}
.sb-item.active svg{opacity:1}
.sb-parent{justify-content:space-between}
.sb-pl{display:flex;align-items:center;gap:8px}
.sb-chev{width:10px;height:10px;opacity:.4;transition:transform .15s;flex-shrink:0}
.sb-parent.open .sb-chev{transform:rotate(90deg)}
.sb-kids{display:none}
.sb-kids.open{display:block}
.sb-kid{padding:4px 16px 4px 36px;font-size:11px;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;display:block;border-left:2px solid transparent}
.sb-kid:hover{background:var(--bg2);color:var(--text)}
.sb-kid.active{color:var(--accent);background:var(--accent-bg);border-left-color:var(--accent)}
.sb-footer{border-top:1px solid var(--border);padding:10px 16px}
.sb-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px;border-radius:4px}
.sb-user:hover{background:var(--bg2)}
.sb-ava{width:26px;height:26px;border-radius:4px;background:var(--accent);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-uname{font-size:11px;color:var(--text)}
.sb-urole{font-size:10px;color:var(--text3)}

/* Topbar */
.topbar{height:44px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:10}
.topbar-menu{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;display:none}
.topbar-title{font-size:13px;color:var(--text)}
.topbar-sep{width:1px;height:14px;background:var(--border2)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.conn{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.content{padding:18px 22px 40px}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px 16px}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em}
.stat-val{font-size:22px;color:var(--text);font-weight:300;line-height:1}
.stat-sub{font-size:10px;color:var(--text3);margin-top:4px}
.up{color:var(--green)}.down{color:var(--red)}

/* Panel */
.panel{background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:14px;overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)}
.pt{font-size:11px;color:var(--text2);letter-spacing:.01em}
.pp{padding:14px 16px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}

/* Table */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:400px}
thead th{font-size:10px;color:var(--text3);font-weight:400;text-align:left;padding:8px 14px;border-bottom:1px solid var(--border);letter-spacing:.03em;text-transform:uppercase;background:var(--bg2);white-space:nowrap}
tbody td{font-size:11px;color:var(--text);padding:8px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2)}
.sticky-col thead th:first-child,.sticky-col tbody td:first-child{position:sticky;left:0;background:var(--bg2);z-index:2;box-shadow:1px 0 0 var(--border)}
.sticky-col tbody tr:hover td:first-child{background:var(--bg3)}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:3px}
.p-red{background:var(--red-bg);color:var(--red)}
.p-amber{background:var(--amber-bg);color:var(--amber)}
.p-green{background:var(--green-bg);color:var(--green)}
.p-blue{background:var(--accent-bg);color:var(--accent)}
.p-gray{background:var(--bg3);color:var(--text2)}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.d-red{background:var(--red)}.d-amber{background:var(--amber)}.d-green{background:var(--green)}

/* Buttons */
.btn{font-family:var(--font);font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border);padding:5px 10px;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn:hover{border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:var(--red-bg);border-color:#fca5a5;color:var(--red)}
.btn-sm{font-size:10px;padding:3px 7px}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}

/* Input / select */
.input,.select{font-family:var(--font);font-size:12px;color:var(--text);background:var(--bg);border:1px solid var(--border);padding:7px 10px;border-radius:4px;width:100%;outline:none}
.input:focus,.select:focus{border-color:var(--accent)}
.field-label{font-size:10px;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.form-group{margin-bottom:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Upload */
.upload-zone{border:1px dashed var(--border2);border-radius:6px;padding:22px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;display:block}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-bg)}
.upload-zone input[type=file]{display:none}
.upload-icon{font-size:22px;margin-bottom:5px}
.upload-lbl{font-size:11px;color:var(--text2)}
.upload-sub{font-size:10px;color:var(--text3);margin-top:2px}
.import-result{border:1px solid var(--border);border-radius:4px;padding:9px 12px;margin-top:8px;font-size:11px;color:var(--text2);background:var(--bg2)}
.import-result.ok{border-color:#86efac;background:var(--green-bg);color:var(--green)}
.import-result.err{border-color:#fca5a5;background:var(--red-bg);color:var(--red)}
.import-result.info{border-color:#93c5fd;background:var(--accent-bg);color:var(--accent)}

/* Message feed */
.msg-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.msg-item:last-child{border-bottom:none}
.msg-item.breach-row{border-left:2px solid var(--red);background:var(--red-bg)}
.msg-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.msg-body{flex:1;min-width:0}
.msg-r1{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px}
.msg-guest{font-size:11px;color:var(--text)}
.msg-time{font-size:10px;color:var(--text3);white-space:nowrap}
.msg-text{font-size:11px;color:var(--text2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px}
.msg-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:13px;color:var(--text2);margin-bottom:4px}
.empty-sub{font-size:11px;color:var(--text3);max-width:320px;line-height:1.6}

/* Agent card grid */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:14px 16px}
.agent-card{border:1px solid var(--border);border-radius:6px;padding:14px;background:var(--bg)}
.agent-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.agent-ava{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0}
.agent-name{font-size:12px;color:var(--text)}
.agent-role{font-size:10px;color:var(--text3)}
.agent-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.agent-stat{background:var(--bg2);border-radius:4px;padding:6px 8px}
.agent-stat-val{font-size:16px;color:var(--text);font-weight:300;line-height:1}
.agent-stat-lbl{font-size:9px;color:var(--text3);margin-top:2px;text-transform:uppercase}

/* Status dot */
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-dot.on{background:var(--green)}.status-dot.off{background:var(--border2)}
.progress-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;font-size:11px;padding:8px 14px;border-radius:4px;opacity:0;transform:translateY(4px);transition:all .2s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;transform:translateY(0)}

/* Modal */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:22px;width:420px;max-width:94vw;max-height:90vh;overflow-y:auto}
.modal-box.wide{width:540px}
.modal-title{font-size:13px;color:var(--text);margin-bottom:14px}
.modal-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:14px}

/* User rows */
.user-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.user-ava{width:28px;height:28px;border-radius:4px;background:var(--accent);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:11px;color:var(--text)}
.user-email{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-acts{display:flex;gap:4px;flex-shrink:0}

/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:8px;padding:10px 22px;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:44px;z-index:9}
.filter-bar .select,.filter-bar .input{width:auto;padding:4px 8px;font-size:11px}
.filter-bar .btn{padding:4px 10px}
.clock{font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums;min-width:60px;text-align:right}

/* Search bar */
.search-wrap{position:relative;flex:1;min-width:160px;max-width:260px}
.search-wrap .input{padding-left:26px;font-size:11px}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}

/* Heatmap */
.heatmap{display:grid;grid-template-columns:40px repeat(24,1fr);gap:2px;padding:14px 16px}
.hm-cell{height:22px;border-radius:2px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3)}
.hm-label{font-size:9px;color:var(--text3);display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.hm-head{font-size:9px;color:var(--text3);text-align:center}

/* Sentiment */
.sentiment-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:4px;display:flex;gap:1px}
.sb-pos{background:var(--green)}.sb-neu{background:var(--border2)}.sb-neg{background:var(--red)}

/* Export btn */
.export-row{display:flex;justify-content:flex-end;padding:8px 16px;border-top:1px solid var(--border)}

/* Alert badge */
.alert-dot{width:7px;height:7px;background:var(--red);border-radius:50%;display:inline-block;margin-left:4px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Trend mini */
.trend-mini{display:inline-flex;align-items:center;gap:3px;font-size:10px}

/* Score ring */
.score-ring{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:300;border:2px solid var(--border);flex-shrink:0}

/* Property tag */
.prop-tag{font-size:10px;color:var(--accent);background:var(--accent-bg);padding:1px 6px;border-radius:3px;margin-left:4px}

.text-muted{font-size:10px;color:var(--text3)}
code.ic{font-size:10px;background:var(--bg2);padding:1px 6px;border-radius:3px;font-family:monospace}
.chart-wrap{padding:12px 16px 10px}
canvas{max-height:160px}
.select-note{font-size:10px;color:var(--accent);margin-top:4px}

/* Step indicator */
.steps{display:flex;gap:0;margin-bottom:20px}
.step{flex:1;padding:10px 14px;font-size:11px;color:var(--text3);border-bottom:2px solid var(--border);display:flex;align-items:center;gap:6px}
.step.active{color:var(--accent);border-bottom-color:var(--accent)}
.step.done{color:var(--green);border-bottom-color:var(--green)}
.step-num{width:18px;height:18px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}

/* Mobile */
.mob-bar{display:none;height:44px;background:var(--bg);border-bottom:1px solid var(--border);align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:20}
.mob-menu{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px}
.mob-title{font-size:12px;color:var(--text)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:25}

@media(max-width:960px){.stats-row{grid-template-columns:repeat(2,1fr)}.two-col,.three-col{grid-template-columns:1fr}}
@media(max-width:680px){
  .shell{display:block;height:auto;overflow:visible}
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .2s;width:240px !important;min-width:240px !important}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay.open{display:block}
  .sb-close{display:block}
  .mob-bar{display:flex}
  .topbar{display:none !important}
  .main{height:100vh;overflow-y:auto}
  .stats-row{grid-template-columns:1fr 1fr}
  .content{padding:14px 14px 40px}
}
@media(min-width:681px) and (max-width:920px){
  .topbar-menu{display:flex !important}
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay.open{display:block}
  .sb-close{display:block}
}
</style>
</head>
<body>
<div class="sb-overlay" id="sbOverlay"></div>
<div class="toast" id="toast"></div>

<!-- Admin Login Modal -->
<div class="modal-wrap" id="adminModal" style="display:none">
  <div class="modal-box">
    <div class="modal-title">Admin access</div>
    <div class="form-group"><label class="field-label">Password</label><input class="input" type="password" id="adminPw" placeholder="Enter password"></div>
    <div id="pwErr" style="font-size:10px;color:var(--red);min-height:14px"></div>
    <div class="modal-actions">
      <button class="btn" id="adminCancel">Cancel</button>
      <button class="btn btn-primary" id="adminSubmit">Login</button>
    </div>
    <div class="text-muted" style="margin-top:10px">Default: <code class="ic">guestcare</code></div>
  </div>
</div>

<!-- User Management Modal -->
<div class="modal-wrap" id="userModal" style="display:none">
  <div class="modal-box wide">
    <div class="modal-title">User management</div>
    <div id="userList"></div>
    <div class="divider"></div>
    <div id="addUserForm" style="display:none">
      <div style="font-size:11px;color:var(--text);margin-bottom:10px">Add new user</div>
      <div class="form-group"><label class="field-label">Full name</label><input class="input" id="nu_name" placeholder="e.g. Sara Lopez"></div>
      <div class="form-row">
        <div class="form-group"><label class="field-label">Username</label><input class="input" id="nu_user" placeholder="saral"></div>
        <div class="form-group"><label class="field-label">Role</label><select class="select" id="nu_role"><option>Agent</option><option>Supervisor</option><option>Admin</option></select></div>
      </div>
      <div class="form-group"><label class="field-label">Email</label><input class="input" id="nu_email" placeholder="sara@homevy.com"></div>
      <div class="form-group"><label class="field-label">Password</label><input class="input" type="password" id="nu_pass" placeholder="••••••••"></div>
      <div id="nuErr" style="font-size:10px;color:var(--red);min-height:14px"></div>
      <div class="modal-actions" style="margin-top:0">
        <button class="btn" id="cancelAdd">Cancel</button>
        <button class="btn btn-primary" id="saveAdd">Save user</button>
      </div>
    </div>
    <div id="editUserForm" style="display:none">
      <div style="font-size:11px;color:var(--text);margin-bottom:10px">Edit user</div>
      <input type="hidden" id="eu_id">
      <div class="form-group"><label class="field-label">Full name</label><input class="input" id="eu_name"></div>
      <div class="form-row">
        <div class="form-group"><label class="field-label">Username</label><input class="input" id="eu_user"></div>
        <div class="form-group"><label class="field-label">Role</label><select class="select" id="eu_role"><option>Agent</option><option>Supervisor</option><option>Admin</option></select></div>
      </div>
      <div class="form-group"><label class="field-label">Email</label><input class="input" id="eu_email"></div>
      <div class="modal-actions" style="margin-top:0">
        <button class="btn" id="cancelEdit">Cancel</button>
        <button class="btn btn-primary" id="saveEdit">Save changes</button>
      </div>
    </div>
    <div id="showAddBtn" style="margin-top:4px"><button class="btn" id="openAdd">+ Add new user</button></div>
    <div class="modal-actions"><button class="btn" id="closeUserModal">Close</button></div>
  </div>
</div>

<!-- Add / Edit Agent Modal -->
<div class="modal-wrap" id="agentModal" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="agentModalTitle">Add agent</div>
    <input type="hidden" id="ag_id">
    <div class="form-group"><label class="field-label">Full name</label><input class="input" id="ag_name" placeholder="e.g. Kudzanayi Moyo"></div>
    <div class="form-row">
      <div class="form-group"><label class="field-label">Role</label><select class="select" id="ag_role"><option>Guest Experience Agent</option><option>Supervisor</option><option>Team Lead</option><option>Manager</option></select></div>
      <div class="form-group"><label class="field-label">Colour</label><select class="select" id="ag_color"><option value="#2563eb">Blue</option><option value="#16a34a">Green</option><option value="#d97706">Amber</option><option value="#dc2626">Red</option><option value="#7c3aed">Purple</option><option value="#0891b2">Cyan</option></select></div>

/* ══════════════════════════════════════════

const COLORS = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#be185d','#0f766e'];
function agentColor(id){ const a=store.agents.find(x=>x.id===id); return a&&a.color ? a.color : COLORS[0]; }
function agentName(id){ const a=store.agents.find(x=>x.id===id); return a ? a.name : 'Unknown'; }

// WhatsApp TXT parser — format: [DD/MM/YYYY, HH:MM:SS] Sender: Message
// agentWaName = the exact WhatsApp display name of the selected agent
function parseWhatsApp(text, agentWaName, agentId, channel){
  // multiple format patterns
  const patterns = [
    /^\[(\d{1,2}\/\d{1,2}\/\d{2,4}),\s*(\d{1,2}:\d{2}(?::\d{2})?)\s*(?:AM|PM)?\]\s*([^:]+):\s*(.+)$/i,
    /^(\d{1,2}\/\d{1,2}\/\d{2,4}),\s*(\d{1,2}:\d{2}(?::\d{2})?)\s*(?:AM|PM)?\s*-\s*([^:]+):\s*(.+)$/i
  ];

  const threads = {}; // keyed by guest name
  const lines = text.split('\n');
  let matched = 0;

  lines.forEach(line => {
    let m = null;
    for(const p of patterns){ m = line.match(p); if(m) break; }
    if(!m) return;
    const [, dateStr, timeStr, rawSender, body] = m;
    const sender = rawSender.trim().replace(/^[~\u200e]/,'').trim();
    if(!sender || body.trim()==='<Media omitted>' || body.trim()==='This message was deleted') return;

    // Parse timestamp
    const parts = dateStr.split('/');
    let d,mo,y;
    if(parseInt(parts[0])>12){ [d,mo,y] = parts; } // DD/MM/YYYY
    else { [mo,d,y] = parts; } // MM/DD/YYYY fallback
    const fullYear = y.length===2 ? '20'+y : y;
    const ts = new Date(`${fullYear}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}T${timeStr.includes(':')&&timeStr.split(':').length===2?timeStr+':00':timeStr}`).getTime();
    if(isNaN(ts)) return;
    matched++;

    // Is this the agent or a guest?
    const isAgent = agentWaName.toLowerCase().split(',').map(s=>s.trim()).some(n=>sender.toLowerCase().includes(n));

    if(!isAgent){
      // guest message
      if(!threads[sender]) threads[sender] = { msgs:[], guestName: sender };
      threads[sender].msgs.push({ ts, body, role:'guest' });
    } else {
      // agent reply — add to ALL open threads that are waiting for response
      Object.values(threads).forEach(t => t.msgs.push({ ts, body, role:'agent' }));
    }
  });

  if(matched===0) return { error: 'No messages matched. Check the file is a WhatsApp .txt export.' };

  const result = [];
  const slaMs = SLA[channel] * 60000;

  Object.values(threads).forEach(th => {
    if(!th.msgs.length) return;
    // Find first guest message, then first agent reply after it
    let lastGuestTs = null, firstAgentTs = null, guestBlock = false;
    th.msgs.sort((a,b)=>a.ts-b.ts);
    for(const msg of th.msgs){
      if(msg.role==='guest'){ lastGuestTs=msg.ts; guestBlock=true; firstAgentTs=null; }
      else if(guestBlock && lastGuestTs && !firstAgentTs){ firstAgentTs=msg.ts; guestBlock=false; }
    }
    const rt    = firstAgentTs ? +((firstAgentTs - lastGuestTs)/60000).toFixed(1) : null;
    const breach= rt!=null ? rt > SLA[channel] : !firstAgentTs;
    const lastG = th.msgs.filter(m=>m.role==='guest').slice(-1)[0];
    result.push({
      id: 'wa_'+Date.now()+'_'+Math.random().toString(36).slice(2),
      agentId, channel, guest: th.guestName,
      message: lastG ? lastG.body : '',
      ts: lastG ? lastG.ts : Date.now(),
      intent:'WhatsApp', urgency: breach?'high':'low',
      responded: firstAgentTs!=null, rt, breach
    });
  });

  return { messages: result, matched, threads: Object.keys(threads).length };
}

// Hostaway CSV parser
// Expected cols: thread_id, timestamp, direction (Inbound/Outbound), message, guest_name (optional)
function parseHostaway(csvText, agentId, channel){
  const res = Papa.parse(csvText, { header:true, skipEmptyLines:true });
  if(!res.data.length) return { error:'CSV appears empty or has no rows.' };

  const threads = {};
  res.data.forEach(row => {
    const tid    = row.thread_id || row['Thread ID'] || row.ThreadId || Object.values(row)[0] || '';
    const tsRaw  = row.timestamp  || row.Timestamp  || row.Date || row.date || Object.values(row)[1] || '';
    const dirRaw = (row.direction || row.Direction  || row.dir  || '').toLowerCase();
    const body   = row.message    || row.Message    || row.body || row.Body || Object.values(row)[3] || '';
    const guest  = row.guest      || row.Guest      || row.guest_name || row.GuestName || 'Guest-'+tid;
    const ts     = new Date(tsRaw).getTime();
    if(!tid || isNaN(ts)) return;
    if(!threads[tid]) threads[tid] = { msgs:[], guest: String(guest).trim() };
    const isAgent = dirRaw.includes('out');
    threads[tid].msgs.push({ ts, body, role: isAgent?'agent':'guest' });
  });

  if(!Object.keys(threads).length) return { error:'No threads found. Check columns: thread_id, timestamp, direction, message.' };

  const result = [];
  Object.entries(threads).forEach(([tid, th]) => {
    th.msgs.sort((a,b)=>a.ts-b.ts);
    let lastGuestTs=null, firstAgentTs=null, guestBlock=false;
    for(const msg of th.msgs){
      if(msg.role==='guest'){ lastGuestTs=msg.ts; guestBlock=true; firstAgentTs=null; }
      else if(guestBlock && lastGuestTs && !firstAgentTs){ firstAgentTs=msg.ts; guestBlock=false; }
    }
    const rt     = firstAgentTs ? +((firstAgentTs - lastGuestTs)/60000).toFixed(1) : null;
    const breach = rt!=null ? rt > SLA.Hostaway : !firstAgentTs;
    const lastG  = th.msgs.filter(m=>m.role==='guest').slice(-1)[0];
    result.push({
      id: 'ha_'+Date.now()+'_'+Math.random().toString(36).slice(2),
      agentId, channel:'Hostaway', guest: th.guest,
      message: lastG ? lastG.body : '',
      ts: lastG ? lastG.ts : Date.now(),
      intent:'Hostaway', urgency: breach?'high':'low',
      responded: firstAgentTs!=null, rt, breach
    });
  });

  return { messages: result, matched: res.data.length, threads: Object.keys(threads).length };
}

/* ══════════════════════════════════════════
   SYNC — merge parsed data into store & push everywhere
══════════════════════════════════════════ */
function syncAll(parsed, agentId, fileName, channel){
  const newMsgs=[], newBreaches=[];

  parsed.forEach(pm => {
    if(!store.messages.find(m=>m.id===pm.id)){
      store.messages.push(pm);
      newMsgs.push(pm);
    }
  });

  // Derive root cause entries from breaches
  newMsgs.filter(m=>m.breach).forEach(b => {
    const entry = {
      agentId, agentName: agentName(agentId),
      guest:b.guest, channel:b.channel, msg:b.message,
      ts:b.ts, rt:b.rt,
      reason: b.rt!=null ? b.rt+'m > '+SLA[b.channel]+'m SLA' : 'No agent response recorded'
    };
    if(!store.rootCause.find(r=>r.guest===b.guest&&Math.abs(r.ts-b.ts)<60000)){
      store.rootCause.push(entry);
      newBreaches.push(entry);
    }
  });

  recalcKPI();
  saveLocal();

  // Push to Supabase
  sbPushMessages(newMsgs);
  sbPushRootCause(newBreaches);
  sbUpsertKPI();

  // Log import
  const logEntry = new Date().toLocaleString()+' — '+channel+' for '+agentName(agentId)+': '+parsed.length+' conversations from '+fileName;
  store.importLog.unshift(logEntry);
  sbLogImport(logEntry);

  showToast('Import complete — all sections updated');
  render(currentView);
}

    const m=store.messages.filter(x=>x.agentId===a.id&&x.responded&&x.rt!=null);
    const delays=m.filter(x=>x.rt>SLA[x.channel]);
    return`<tr><td><span class="pill" style="background:${a.color}22;color:${a.color}">${a.name}</span></td><td>${s.avgRt?s.avgRt+'m':'—'}</td><td>${m.length?Math.min(...m.map(x=>x.rt)).toFixed(1)+'m':'—'}</td><td>${m.length?Math.max(...m.map(x=>x.rt)).toFixed(1)+'m':'—'}</td><td>${delays.length}</td><td>${s.slaHit?s.slaHit+'%':'—'}</td></tr>`;
  });
  return`<div class="panel"><div class="ph"><span class="pt">${title}</span></div>
    <div class="tw"><table><thead><tr><th>Agent</th><th>Avg</th><th>Best</th><th>Worst</th><th>Over SLA</th><th>SLA rate</th></tr></thead><tbody>${rows.join('')}</tbody></table></div>
  </div><div class="panel"><div class="ph"><span class="pt">Trend chart</span></div><div class="chart-wrap"><canvas id="rtChart"></canvas></div></div>`;
}

/* ══════════════════════════════════════════
   IMPORT WIRING — fires every time Import view renders
══════════════════════════════════════════ */
function wireImport(){
  // Drag zones
  ['waZone','haZone'].forEach(zid=>{
    const z=document.getElementById(zid); if(!z) return;
    z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag');});
    z.addEventListener('dragleave',()=>z.classList.remove('drag'));
    z.addEventListener('drop',e=>{
      e.preventDefault(); z.classList.remove('drag');
      const inp=z.querySelector('input[type=file]');
      if(inp&&e.dataTransfer.files.length){ const dt=new DataTransfer(); dt.items.add(e.dataTransfer.files[0]); inp.files=dt.files; inp.dispatchEvent(new Event('change')); }
    });
  });

  // Show file name when selected
  const waFile=document.getElementById('waFile');
  const haFile=document.getElementById('haFile');
  if(waFile) waFile.onchange=()=>{ if(waFile.files[0]) document.getElementById('waResult').innerHTML=`<div class="import-result info">File selected: ${waFile.files[0].name} (${(waFile.files[0].size/1024).toFixed(0)} KB)</div>`; };
  if(haFile) haFile.onchange=()=>{ if(haFile.files[0]) document.getElementById('haResult').innerHTML=`<div class="import-result info">File selected: ${haFile.files[0].name} (${(haFile.files[0].size/1024).toFixed(0)} KB)</div>`; };

  // WhatsApp parse button

    const agentId=document.getElementById('wa_agent')?.value;

    if(!file){ res.innerHTML='<div class="import-result err">Please select a .txt file.</div>'; return; }
    const agent=store.agents.find(a=>a.id===agentId);
    if(!agent.waName){ res.innerHTML='<div class="import-result err">This agent has no WhatsApp display name set. Edit the agent to add it.</div>'; return; }
    res.innerHTML='<div class="import-result info">Parsing file…</div>';
    const rd=new FileReader();
    rd.onload=e=>{
      const result=parseWhatsApp(e.target.result, agent.waName, agentId, 'WhatsApp');
      if(result.error){ res.innerHTML=`<div class="import-result err">${result.error}</div>`; return; }
      const {messages,matched,threads}=result;
      res.innerHTML=`<div class="import-result ok">✓ Parsed ${matched} lines · ${threads} guest conversations found · ${messages.filter(m=>m.breach).length} SLA breaches detected</div>`;
      conf.style.display='block';
      conf.innerHTML=`
        <div style="font-size:11px;color:var(--text);margin:10px 0 6px;">Preview — ${messages.length} conversations for <span class="pill p-blue">${agent.name}</span></div>
        <div class="tw" style="max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;">
          <table><thead><tr><th>Guest</th><th>Last message</th><th>Response time</th><th>SLA</th></tr></thead>
          <tbody>${messages.slice(0,20).map(m=>`<tr>
            <td>${m.guest}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${m.message||'—'}</td>
            <td>${m.rt!=null?m.rt+'m':'No response'}</td>
            <td>${m.breach?'<span class="down">Breach</span>':'<span class="up">OK</span>'}</td>
          </tr>`).join('')}</tbody></table>
        </div>
        <button class="btn btn-primary" style="margin-top:10px;width:100%;justify-content:center;" id="waConfirmBtn">Confirm & import to dashboard</button>`;
      document.getElementById('waConfirmBtn').onclick=()=>{
        syncAll(messages, agentId, file.name, 'WhatsApp');
        conf.innerHTML='<div class="import-result ok">✓ Imported — all sections updated</div>';
      };
    };
    rd.readAsText(file);
  };

  // Hostaway parse button
  const haBtn=document.getElementById('haParseBtn');
  if(haBtn) haBtn.onclick=()=>{
    const agentId=document.getElementById('ha_agent')?.value;
    const file=document.getElementById('haFile')?.files[0];
    const res=document.getElementById('haResult');
    const conf=document.getElementById('haConfirm');
    if(!agentId){ res.innerHTML='<div class="import-result err">Please select an agent first.</div>'; return; }
    if(!file){ res.innerHTML='<div class="import-result err">Please select a .csv file.</div>'; return; }
    res.innerHTML='<div class="import-result info">Parsing CSV…</div>';
    const rd=new FileReader();
    rd.onload=e=>{
      const result=parseHostaway(e.target.result, agentId, 'Hostaway');
      if(result.error){ res.innerHTML=`<div class="import-result err">${result.error}</div>`; return; }
      const {messages,matched,threads}=result;
      res.innerHTML=`<div class="import-result ok">✓ Parsed ${matched} rows · ${threads} conversations found · ${messages.filter(m=>m.breach).length} SLA breaches</div>`;
      conf.style.display='block';
      conf.innerHTML=`
        <div style="font-size:11px;color:var(--text);margin:10px 0 6px;">Preview — ${messages.length} conversations for <span class="pill p-blue">${agentName(agentId)}</span></div>
        <div class="tw" style="max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;">
          <table><thead><tr><th>Guest</th><th>Last message</th><th>Response time</th><th>SLA</th></tr></thead>
          <tbody>${messages.slice(0,20).map(m=>`<tr>
            <td>${m.guest}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${m.message||'—'}</td>
            <td>${m.rt!=null?m.rt+'m':'No response'}</td>
            <td>${m.breach?'<span class="down">Breach</span>':'<span class="up">OK</span>'}</td>
          </tr>`).join('')}</tbody></table>
        </div>
        <button class="btn btn-primary" style="margin-top:10px;width:100%;justify-content:center;" id="haConfirmBtn">Confirm & import to dashboard</button>`;
      document.getElementById('haConfirmBtn').onclick=()=>{
        syncAll(messages, agentId, file.name, 'Hostaway');
        conf.innerHTML='<div class="import-result ok">✓ Imported — all sections updated</div>';
      };
    };
    rd.readAsText(file);
  };
}

/* ══════════════════════════════════════════
   GLOBAL FILTER ENGINE
   — all analysis views read filteredMessages()
══════════════════════════════════════════ */
function getFilters(){
  return {
    agentId: document.getElementById('filterAgent')?.value||'',
    period:  document.getElementById('filterPeriod')?.value||'all',
    channel: document.getElementById('filterChannel')?.value||'',
    search:  (document.getElementById('filterSearch')?.value||'').toLowerCase().trim()
  };
}

function filteredMessages(){
  const f=getFilters();
  const now=Date.now();
  const cutoff={ today:86400000, '7':7*86400000, '30':30*86400000, '90':90*86400000 }[f.period];
  return store.messages.filter(m=>{
    if(f.agentId && m.agentId!==f.agentId) return false;
    if(cutoff && (now-m.ts)>cutoff) return false;
    if(f.channel && m.channel!==f.channel) return false;
    if(f.search && !m.guest.toLowerCase().includes(f.search) && !(m.message||'').toLowerCase().includes(f.search)) return false;
    return true;
  });
}

function updateFilterCount(){
  const el=document.getElementById('filterCount'); if(!el) return;
  const total=store.messages.length, shown=filteredMessages().length;
  el.textContent = total===shown ? total+' conversations' : shown+' of '+total+' shown';
}

function populateAgentFilter(){
  const sel=document.getElementById('filterAgent'); if(!sel) return;
  const cur=sel.value;
  sel.innerHTML='<option value="">All agents</option>'+store.agents.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  sel.value=cur;
}

['filterAgent','filterPeriod','filterChannel','filterSearch'].forEach(id=>{
  document.addEventListener('change',e=>{ if(e.target&&e.target.id===id){ updateFilterCount(); render(currentView); } });
  document.addEventListener('input',e=>{ if(e.target&&e.target.id===id){ updateFilterCount(); render(currentView); } });

};

══════════════════════════════════════════ */
const KEYWORDS = {
  high: ['emergency','overflowing','flood','fire','no water','no power','broken','burst','smoke','gas leak','locked out','accident','injury','blood','help','urgent','asap','immediately'],
  medium: ['not working','issue','problem','complaint','refund','unhappy','disappointed','dirty','smell','noise','cold','hot','broken','leak'],
  low: ['checkout','check-out','check in','checkin','wifi','password','towel','pillow','key','parking','late','early','directions','info','question','when']
};
const INTENT_MAP = {
  'Maintenance': ['broken','not working','leak','flood','repair','fix','heater','ac','aircon','plumbing','electricity','wifi'],
  'Complaint':   ['refund','unhappy','dirty','smell','disgusting','complaint','disappointed','unacceptable','terrible','awful'],
  'Emergency':   ['emergency','overflowing','fire','smoke','gas','injury','blood','help','urgent','flood'],
  'Question':    ['what time','when','how','where','can i','is it','do you','checkout','checkin','directions','parking'],
  'Amenity':     ['towel','pillow','soap','shampoo','blanket','iron','hairdryer','extra'],
};

function classifyMessage(text){
  const t=(text||'').toLowerCase();
  let urgency='low';
  if(KEYWORDS.high.some(k=>t.includes(k))) urgency='high';
  else if(KEYWORDS.medium.some(k=>t.includes(k))) urgency='medium';
  let intent='General';
  for(const [cat,words] of Object.entries(INTENT_MAP)){
    if(words.some(w=>t.includes(w))){ intent=cat; break; }
  }
  return { urgency, intent };
}

/* patch classifier into parser output */
const _origSyncAll = syncAll;
window.syncAll = function(parsed, agentId, fileName, channel){
  parsed.forEach(m=>{ const c=classifyMessage(m.message); m.urgency=c.urgency; m.intent=c.intent; });
  _origSyncAll(parsed, agentId, fileName, channel);
};

/* ══════════════════════════════════════════
   SENTIMENT SCORING  (keyword-based, no API)
══════════════════════════════════════════ */
const POS_WORDS=['thank','thanks','great','excellent','perfect','amazing','wonderful','love','happy','good','clean','comfortable','nice','fantastic','brilliant','quick','fast','helpful','superb'];
const NEG_WORDS=['dirty','broken','terrible','awful','horrible','disgusting','unacceptable','worst','bad','slow','noisy','smelly','disappointed','frustrated','angry','refund','complaint','emergency','never','problem'];

function scoreSentiment(text){
  const t=(text||'').toLowerCase().split(/\s+/);
  const pos=t.filter(w=>POS_WORDS.includes(w)).length;
  const neg=t.filter(w=>NEG_WORDS.includes(w)).length;
  const total=pos+neg||1;
  return { pos:Math.round(100*pos/total), neg:Math.round(100*neg/total), neu:Math.round(100*(total-pos-neg)/total), label:neg>pos?'Negative':pos>neg?'Positive':'Neutral' };
}

function agentSentiment(agentId){
  const msgs=filteredMessages().filter(m=>m.agentId===agentId);
  if(!msgs.length) return null;
  const scores=msgs.map(m=>scoreSentiment(m.message));
  return {
    pos:  Math.round(scores.reduce((s,x)=>s+x.pos,0)/scores.length),
    neg:  Math.round(scores.reduce((s,x)=>s+x.neg,0)/scores.length),
    neu:  Math.round(scores.reduce((s,x)=>s+x.neu,0)/scores.length),
    total:msgs.length
  };
}

/* ══════════════════════════════════════════
   RESPONSE TIME HEATMAP  (hour × day)
══════════════════════════════════════════ */
function buildHeatmap(){
  const msgs=filteredMessages().filter(m=>m.responded&&m.rt!=null);
  const grid={}; // key: 'day_hour'
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  msgs.forEach(m=>{
    const d=new Date(m.ts), day=d.getDay(), hour=d.getHours();
    const k=day+'_'+hour;
    if(!grid[k]) grid[k]={sum:0,count:0};
    grid[k].sum+=m.rt; grid[k].count++;
  });
  return {grid, days};
}

function exportCSV(rows, headers, filename){
  const csv=[headers.join(','),...rows.map(r=>headers.map(h=>{
    const v=r[h]!=null?String(r[h]):'';
    return v.includes(',')||v.includes('"') ? '"'+v.replace(/"/g,'""')+'"' : v;
  }).join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  URL.revokeObjectURL(a.href);
}

VIEWS.heatmap = () => {
  const {grid, days}=buildHeatmap();
  const vals=Object.values(grid).map(v=>v.sum/v.count);
  const maxVal=Math.max(...vals,1);

  function cellColor(day,hour){
    const k=day+'_'+hour, v=grid[k];
    if(!v) return 'background:var(--bg3)';
    const rt=v.sum/v.count, intensity=Math.min(rt/maxVal,1);
    if(rt>10) return `background:rgba(220,38,38,${0.15+intensity*0.7})`;
    if(rt>5)  return `background:rgba(217,119,6,${0.15+intensity*0.7})`;
    return `background:rgba(22,163,74,${0.15+intensity*0.7})`;
  }
  function cellLabel(day,hour){
    const k=day+'_'+hour, v=grid[k];
    return v ? (v.sum/v.count).toFixed(1)+'m' : '';
  }

  const hours=Array.from({length:24},(_,i)=>i);
  const rows=days.map((d,di)=>`
    <div class="hm-label">${d}</div>
    ${hours.map(h=>`<div class="hm-cell" style="${cellColor(di,h)}" title="${d} ${h}:00 — avg ${cellLabel(di,h)||'no data'}">${cellLabel(di,h)}</div>`).join('')}
  `).join('');

  const noData=!Object.keys(grid).length;
  return `
  <div class="panel">
    <div class="ph"><span class="pt">Response time heatmap — by hour and day</span></div>
    ${noData ? emptyState('📊','No data yet','Import conversations to see when your team is fastest and slowest.') : `
    <div class="heatmap">
      <div class="hm-head"></div>${hours.map(h=>`<div class="hm-head">${h}</div>`).join('')}
      ${rows}
    </div>
    <div class="pp" style="border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:16px;align-items:center;">
      <span class="text-muted">Darker = slower response. Hours shown are local time.</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--green)">■ Fast (≤5m)</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--amber)">■ Moderate (5-10m)</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--red)">■ Slow (>10m)</span>
    </div>`}
  </div>
  <div class="panel">
    <div class="ph"><span class="pt">Busiest hours — message volume</span></div>
    <div class="chart-wrap"><canvas id="hourChart"></canvas></div>
  </div>`;

        <div class="form-group"><label class="field-label">Hostaway SLA (minutes)</label><input class="input" id="sla_ha" type="number" value="${SLA.Hostaway}" min="1" max="60"></div>
      </div>
      <button class="btn btn-primary" id="saveSLA">Save SLA targets</button>
    </div>
  </div>
  <div class="panel">
    <div class="ph"><span class="pt">Export reports</span></div>
    <div class="pp" style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn" onclick="exportAgentReport()">Agent performance CSV</button>
      <button class="btn" onclick="exportBreachReport()">SLA breaches CSV</button>
      <button class="btn" onclick="exportMessages()">All messages CSV</button>
    </div>
  </div>`;
};

/* Wire SLA save in admin view */
document.addEventListener('click', e=>{
  if(e.target&&e.target.id==='saveSLA'){
    const wa=parseInt(document.getElementById('sla_wa')?.value)||10;
    const ha=parseInt(document.getElementById('sla_ha')?.value)||5;
    SLA.WhatsApp=wa; SLA.Hostaway=ha;
    store.slaConfig={WhatsApp:wa,Hostaway:ha};
    saveLocal();
    showToast(`SLA updated — WhatsApp: ${wa}m · Hostaway: ${ha}m`);
  }
});

// Restore SLA config from store on load
if(store.slaConfig){ SLA.WhatsApp=store.slaConfig.WhatsApp||10; SLA.Hostaway=store.slaConfig.Hostaway||5; }

/* ══════════════════════════════════════════
   OVERRIDE BOOT — re-render with patched render
══════════════════════════════════════════ */
window.render('overview');
populateAgentFilter();
updateFilterCount();

})();
</script>
</body>
</html>
