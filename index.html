<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuestCare Command</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<!-- Supabase removed -->
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa; --bg2:#f4f4f2; --bg3:#eeede9; --bg-card:#ffffff; --border:#e8e6e1; --border2:#d4d2cc;
  --text:#1a1a18; --text2:#5c5c52; --text3:#999890; --accent:#3d5a80; --accent-light:#e8edf5; --accent-mid:#6b8cae;
  --red:#b54a4a; --red-bg:#faf2f2; --red-mid:#d97979;
  --amber:#9a6c2e; --amber-bg:#faf6ee; --amber-mid:#c49a55;
  --green:#3a7055; --green-bg:#f0f7f4; --green-mid:#5d9e81;
  --sw:220px; --font:'DM Sans',sans-serif; --radius:8px; --radius-sm:5px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.04);
}
html,body{height:100%;font-family:var(--font);font-size:12px;color:var(--text);background:var(--bg);line-height:1.5;font-weight:400;-webkit-font-smoothing:antialiased}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;z-index:30}
.main{flex:1;overflow-y:auto;min-width:0;background:var(--bg)}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.sb-brand-name{font-size:13px;color:var(--text);letter-spacing:-.02em;line-height:1.3}
.sb-brand-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-left:3px;margin-bottom:1px;vertical-align:middle}
.sb-brand-sub{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.01em}
.sb-close{display:none;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 4px;line-height:1;transition:color .15s}
.sb-close:hover{color:var(--text)}
.sb-nav{padding:8px 0;flex:1}
.sb-label{font-size:9px;color:var(--text3);padding:12px 16px 3px;letter-spacing:.08em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:8px;padding:5px 16px;font-size:11.5px;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;transition:background .12s,color .12s;border-radius:0}
.sb-item:hover{background:var(--bg2);color:var(--text)}
.sb-item.active{background:var(--accent-light);color:var(--accent);border-left-color:var(--accent)}
.sb-item.parent-active{color:var(--text)}
.sb-item svg{width:13px;height:13px;flex-shrink:0;opacity:.5;transition:opacity .12s}
.sb-item.active svg,.sb-item:hover svg{opacity:.85}
.sb-parent{justify-content:space-between}
.sb-pl{display:flex;align-items:center;gap:8px}
.sb-chev{width:10px;height:10px;opacity:.35;transition:transform .15s;flex-shrink:0}
.sb-parent.open .sb-chev{transform:rotate(90deg)}
.sb-kids{display:none}
.sb-kids.open{display:block}
.sb-kid{padding:4px 16px 4px 36px;font-size:11px;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;display:block;border-left:2px solid transparent;transition:background .12s,color .12s}
.sb-kid:hover{background:var(--bg2);color:var(--text)}
.sb-kid.active{color:var(--accent);background:var(--accent-light);border-left-color:var(--accent)}
.sb-footer{border-top:1px solid var(--border);padding:12px 16px}
.sb-user{display:flex;align-items:center;gap:9px;cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm);transition:background .12s}
.sb-user:hover{background:var(--bg2)}
.sb-ava{width:28px;height:28px;border-radius:6px;background:var(--accent);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.03em}
.sb-uname{font-size:11px;color:var(--text);line-height:1.3}
.sb-urole{font-size:10px;color:var(--text3)}
.topbar{height:44px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:10}
.topbar-menu{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;display:none;transition:color .12s}
.topbar-menu:hover{color:var(--text)}
.topbar-title{font-size:12.5px;color:var(--text);letter-spacing:-.01em}
.topbar-sep{width:1px;height:13px;background:var(--border2)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.conn{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.content{padding:20px 24px 48px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);transition:box-shadow .15s;position:relative;overflow:hidden}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-card-accent{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent-mid),transparent)}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.stat-val{font-size:24px;color:var(--text);font-weight:300;line-height:1;letter-spacing:-.02em}
.stat-val sup{font-size:12px;color:var(--text3);font-weight:400;margin-left:1px;vertical-align:top;margin-top:6px;display:inline-block}
.stat-sub{font-size:10px;color:var(--text3);margin-top:5px}
.up{color:var(--green)}.down{color:var(--red)}
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--bg-card)}
.pt{font-size:11px;color:var(--text2);letter-spacing:.01em}
.pp{padding:14px 16px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:400px}
thead th{font-size:10px;color:var(--text3);font-weight:400;text-align:left;padding:9px 14px;border-bottom:1px solid var(--border);letter-spacing:.04em;text-transform:uppercase;background:var(--bg);white-space:nowrap}
tbody td{font-size:11px;color:var(--text);padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2)}
.sticky-col thead th:first-child,.sticky-col tbody td:first-child{position:sticky;left:0;background:var(--bg);z-index:2;box-shadow:2px 0 4px -1px rgba(0,0,0,.05)}
.sticky-col tbody tr:hover td:first-child{background:var(--bg2)}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 8px;border-radius:20px;letter-spacing:.01em}
.p-red{background:var(--red-bg);color:var(--red)}
.p-amber{background:var(--amber-bg);color:var(--amber)}
.p-green{background:var(--green-bg);color:var(--green)}
.p-blue{background:var(--accent-light);color:var(--accent)}
.p-gray{background:var(--bg3);color:var(--text2)}
.dot{width:4px;height:4px;border-radius:50%;display:inline-block}
.d-red{background:var(--red)}.d-amber{background:var(--amber)}.d-green{background:var(--green)}
.btn{font-family:var(--font);font-size:11px;color:var(--text2);background:var(--bg-card);border:1px solid var(--border);padding:5px 11px;border-radius:var(--radius-sm);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:border-color .12s,color .12s,background .12s,box-shadow .12s;letter-spacing:.01em}
.btn:hover{border-color:var(--border2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 1px 4px rgba(61,90,128,.2)}
.btn-primary:hover{background:#324d6e;border-color:#324d6e;box-shadow:0 2px 6px rgba(61,90,128,.3)}
.btn-danger{background:var(--red-bg);border-color:#e8b4b4;color:var(--red)}
.btn-danger:hover{background:#fae8e8}
.btn-sm{font-size:10px;padding:3px 8px}
.btn-group{display:flex;gap:5px;flex-wrap:wrap}
.input,.select{font-family:var(--font);font-size:12px;color:var(--text);background:var(--bg-card);border:1px solid var(--border);padding:7px 10px;border-radius:var(--radius-sm);width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
.input:focus,.select:focus{border-color:var(--accent-mid);box-shadow:0 0 0 3px rgba(61,90,128,.08)}
.field-label{font-size:10px;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.form-group{margin-bottom:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;display:block;transition:border-color .15s,background .15s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent-mid);background:var(--accent-light)}
.upload-zone input[type=file]{display:none}
.upload-icon{font-size:22px;margin-bottom:6px}
.upload-lbl{font-size:11px;color:var(--text2)}
.upload-sub{font-size:10px;color:var(--text3);margin-top:3px}
.import-result{border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;margin-top:8px;font-size:11px;color:var(--text2);background:var(--bg2)}
.import-result.ok{border-color:#a7d4bc;background:var(--green-bg);color:var(--green)}
.import-result.err{border-color:#e4a5a5;background:var(--red-bg);color:var(--red)}
.import-result.info{border-color:#a5b8d4;background:var(--accent-light);color:var(--accent)}
.msg-item{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.msg-item:hover{background:var(--bg)}
.msg-item:last-child{border-bottom:none}
.msg-item.breach-row{border-left:2px solid var(--red-mid);background:#fdf8f8}
.msg-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.msg-body{flex:1;min-width:0}
.msg-r1{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px}
.msg-guest{font-size:11px;color:var(--text)}
.msg-time{font-size:10px;color:var(--text3);white-space:nowrap}
.msg-text{font-size:11px;color:var(--text2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px;line-height:1.5}
.msg-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 24px;text-align:center}
.empty-icon{font-size:30px;margin-bottom:14px;opacity:.3}
.empty-title{font-size:12px;color:var(--text2);margin-bottom:5px;letter-spacing:-.01em}
.empty-sub{font-size:11px;color:var(--text3);max-width:300px;line-height:1.65}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;padding:14px 16px}
.agent-card{border:1px solid var(--border);border-radius:var(--radius);padding:15px;background:var(--bg-card);box-shadow:var(--shadow);transition:box-shadow .15s,transform .15s}
.agent-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.agent-card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.agent-ava{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;letter-spacing:.04em}
.agent-name{font-size:12px;color:var(--text);line-height:1.3}
.agent-role{font-size:10px;color:var(--text3)}
.agent-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.agent-stat{background:var(--bg);border-radius:var(--radius-sm);padding:7px 9px;border:1px solid var(--border)}
.agent-stat-val{font-size:16px;color:var(--text);font-weight:300;line-height:1}
.agent-stat-lbl{font-size:9px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-dot.on{background:var(--green)}.status-dot.off{background:var(--border2)}
.progress-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px}
.toast{position:fixed;bottom:22px;right:22px;background:rgba(26,26,24,.92);color:#fafafa;font-size:11px;padding:9px 16px;border-radius:var(--radius-sm);opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;pointer-events:none;z-index:9999;backdrop-filter:blur(4px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.show{opacity:1;transform:translateY(0)}
.modal-wrap{position:fixed;inset:0;background:rgba(26,26,24,.2);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadein .15s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:420px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md);animation:slideup .18s ease}
@keyframes slideup{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-box.wide{width:540px}
.modal-title{font-size:13px;color:var(--text);margin-bottom:16px;letter-spacing:-.01em}
.modal-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:14px}
.user-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.user-ava{width:28px;height:28px;border-radius:6px;background:var(--accent);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:11px;color:var(--text)}
.user-email{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-acts{display:flex;gap:4px;flex-shrink:0}
.filter-bar{display:flex;align-items:center;gap:8px;padding:9px 22px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:44px;z-index:9}
.filter-bar .select,.filter-bar .input{width:auto;padding:4px 8px;font-size:11px;border-radius:var(--radius-sm)}
.filter-bar .btn{padding:4px 10px}
.clock{font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums;min-width:60px;text-align:right;letter-spacing:.02em}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:260px}
.search-wrap .input{padding-left:27px;font-size:11px}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.heatmap{display:grid;grid-template-columns:40px repeat(24,1fr);gap:2px;padding:14px 16px}
.hm-cell{height:22px;border-radius:3px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3)}
.hm-label{font-size:9px;color:var(--text3);display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.hm-head{font-size:9px;color:var(--text3);text-align:center}
.sentiment-bar{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:5px;display:flex}
.sb-pos{background:var(--green-mid)}.sb-neu{background:var(--border2)}.sb-neg{background:var(--red-mid)}
.alert-dot{width:6px;height:6px;background:var(--red);border-radius:50%;display:inline-block;margin-left:4px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.prop-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;display:flex;flex-direction:column;gap:9px;box-shadow:var(--shadow);transition:box-shadow .15s,transform .15s}
.prop-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.prop-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.prop-name{font-size:12px;color:var(--text);line-height:1.3}
.prop-meta{font-size:10px;color:var(--text3);margin-top:2px}
.prop-score{font-size:20px;font-weight:300;color:var(--text);letter-spacing:-.02em;line-height:1}
.stars{color:var(--amber-mid);font-size:10px;letter-spacing:1.5px}
.prop-bar-wrap{display:flex;flex-direction:column;gap:4px}
.prop-bar-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3)}
.prop-bar-track{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prop-bar-fill{height:100%;border-radius:2px;background:var(--amber-mid)}
.prop-actions{display:flex;gap:4px;margin-top:2px}
.review-row{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;transition:background .1s}
.review-row:hover{background:var(--bg)}
.review-row:last-child{border-bottom:none}
.review-score-badge{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:300;flex-shrink:0;letter-spacing:-.02em}
.review-body{flex:1;min-width:0}
.review-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px}
.review-guest{font-size:11px;color:var(--text)}
.review-date{font-size:10px;color:var(--text3)}
.review-text{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:5px}
.review-footer{display:flex;align-items:center;gap:6px}
.score-great{background:#edf5f1;color:var(--green)}
.score-good{background:#faf4e6;color:var(--amber)}
.score-bad{background:var(--red-bg);color:var(--red)}
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.analysis-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.analysis-card.attention{border-left:2px solid var(--red-mid)}
.analysis-card.good{border-left:2px solid var(--green-mid)}
.gr-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg)}
.gr-search{position:relative;flex:1;min-width:140px;max-width:280px}
.gr-search svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.gr-search .input{padding-left:27px;font-size:11px}
.rating-row{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text3);margin-bottom:5px}
.rating-row .bar{flex:1;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden}
.rating-row .fill{height:100%;background:var(--amber-mid);border-radius:3px}
.steps{display:flex;margin-bottom:20px}
.step{flex:1;padding:9px 14px;font-size:11px;color:var(--text3);border-bottom:2px solid var(--border);display:flex;align-items:center;gap:6px}
.step.active{color:var(--accent);border-bottom-color:var(--accent)}
.step.done{color:var(--green);border-bottom-color:var(--green)}
.step-num{width:17px;height:17px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.prop-tag{font-size:10px;color:var(--accent);background:var(--accent-light);padding:1px 6px;border-radius:20px;margin-left:4px}
.text-muted{font-size:10px;color:var(--text3)}
code.ic{font-size:10px;background:var(--bg2);padding:1px 7px;border-radius:3px;font-family:monospace;border:1px solid var(--border)}
.chart-wrap{padding:12px 16px 10px}
canvas{max-height:160px}
.select-note{font-size:10px;color:var(--accent);margin-top:4px}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.mob-bar{display:none;height:44px;background:var(--bg-card);border-bottom:1px solid var(--border);align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:20}
.mob-menu{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px}
.mob-title{font-size:12px;color:var(--text)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,24,.2);z-index:25;backdrop-filter:blur(1px)}

<script>
(function(){
// ==================================================
// GUESTCARE DASHBOARD - REFACTORED FOR CUSTOM BACKEND
// Data stored in localStorage; Supabase removed.
// ==================================================

const SK = 'gcc_v6_local';
const SLA = { WhatsApp: 10, Hostaway: 5, default: 10 };

function blank(){
  return {
    agents:[], messages:[], rootCause:[], importLog:[],
    users:[], properties:[], reviews:[],
    kpi:{ avg:0, breaches:0, active:0 }
  };
}

function load(){ try{ return JSON.parse(localStorage.getItem(SK)) || blank(); }catch(e){ return blank(); } }
function saveLocal(){ localStorage.setItem(SK, JSON.stringify(store)); }

let store = load();

// KPI recalculation
function recalcKPI(){
  const m = store.messages;
  const resp = m.filter(x=>x.responded && x.rt!=null);
  store.kpi.avg = resp.length ? +(resp.reduce((s,x)=>s+x.rt,0)/resp.length).toFixed(1) : 0;
  store.kpi.breaches = m.filter(x=>x.breach).length;
  store.kpi.active = m.filter(x=>!x.responded).length;
}

// Agent helpers
const COLORS = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#be185d','#0f766e'];
function agentColor(id){ const a=store.agents.find(x=>x.id===id); return a&&a.color ? a.color : COLORS[0]; }
function agentName(id){ const a=store.agents.find(x=>x.id===id); return a ? a.name : 'Unknown'; }
function agentStats(agentId){
  const m = store.messages.filter(x=>x.agentId===agentId);
  const resp = m.filter(x=>x.responded&&x.rt!=null);
  return {
    total: m.length,
    active: m.filter(x=>!x.responded).length,
    breaches: m.filter(x=>x.breach).length,
    avgRt: resp.length ? +(resp.reduce((s,x)=>s+x.rt,0)/resp.length).toFixed(1) : 0,
    slaHit: resp.length ? Math.round(100*m.filter(x=>x.responded&&!x.breach).length/resp.length) : 0
  };
}

// Parsers (unchanged)
function parseWhatsApp(text, agentWaName, agentId, channel){
  const patterns = [
    /^\[(\d{1,2}\/\d{1,2}\/\d{2,4}),\s*(\d{1,2}:\d{2}(?::\d{2})?)\s*(?:AM|PM)?\]\s*([^:]+):\s*(.+)$/i,
    /^(\d{1,2}\/\d{1,2}\/\d{2,4}),\s*(\d{1,2}:\d{2}(?::\d{2})?)\s*(?:AM|PM)?\s*-\s*([^:]+):\s*(.+)$/i
  ];
  const threads = {};
  const lines = text.split('\n');
  let matched = 0;
  lines.forEach(line => {
    let m = null;
    for(const p of patterns){ m = line.match(p); if(m) break; }
    if(!m) return;
    const [, dateStr, timeStr, rawSender, body] = m;
    const sender = rawSender.trim().replace(/^[~\u200e]/,'').trim();
    if(!sender || body.trim()==='<Media omitted>' || body.trim()==='This message was deleted') return;
    const parts = dateStr.split('/');
    let d,mo,y;
    if(parseInt(parts[0])>12){ [d,mo,y] = parts; } else { [mo,d,y] = parts; }
    const fullYear = y.length===2 ? '20'+y : y;
    const ts = new Date(`${fullYear}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}T${timeStr.includes(':')&&timeStr.split(':').length===2?timeStr+':00':timeStr}`).getTime();
    if(isNaN(ts)) return;
    matched++;
    const isAgent = agentWaName.toLowerCase().split(',').map(s=>s.trim()).some(n=>sender.toLowerCase().includes(n));
    if(!isAgent){
      if(!threads[sender]) threads[sender] = { msgs:[], guestName: sender };
      threads[sender].msgs.push({ ts, body, role:'guest' });
    } else {
      Object.values(threads).forEach(t => t.msgs.push({ ts, body, role:'agent' }));
    }
  });
  if(matched===0) return { error: 'No messages matched.' };
  const result = [];
  const slaMs = SLA[channel] * 60000;
  Object.values(threads).forEach(th => {
    if(!th.msgs.length) return;
    let lastGuestTs = null, firstAgentTs = null, guestBlock = false;
    th.msgs.sort((a,b)=>a.ts-b.ts);
    for(const msg of th.msgs){
      if(msg.role==='guest'){ lastGuestTs=msg.ts; guestBlock=true; firstAgentTs=null; }
      else if(guestBlock && lastGuestTs && !firstAgentTs){ firstAgentTs=msg.ts; guestBlock=false; }
    }
    const rt = firstAgentTs ? +((firstAgentTs - lastGuestTs)/60000).toFixed(1) : null;
    const breach = rt!=null ? rt > SLA[channel] : !firstAgentTs;
    const lastG = th.msgs.filter(m=>m.role==='guest').slice(-1)[0];
    result.push({
      id: 'wa_'+Date.now()+'_'+Math.random().toString(36).slice(2),
      agentId, channel, guest: th.guestName,
      message: lastG ? lastG.body : '',
      ts: lastG ? lastG.ts : Date.now(),
      intent:'WhatsApp', urgency: breach?'high':'low',
      responded: firstAgentTs!=null, rt, breach
    });
  });
  return { messages: result, matched, threads: Object.keys(threads).length };
}

function parseHostaway(csvText, agentId, channel){
  const res = Papa.parse(csvText, { header:true, skipEmptyLines:true });
  if(!res.data.length) return { error:'CSV empty' };
  const threads = {};
  res.data.forEach(row => {
    const tid = row.thread_id || row['Thread ID'] || row.ThreadId || Object.values(row)[0] || '';
    const tsRaw = row.timestamp || row.Timestamp || row.Date || row.date || Object.values(row)[1] || '';
    const dirRaw = (row.direction || row.Direction || row.dir || '').toLowerCase();
    const body = row.message || row.Message || row.body || row.Body || Object.values(row)[3] || '';
    const guest = row.guest || row.Guest || row.guest_name || row.GuestName || 'Guest-'+tid;
    const ts = new Date(tsRaw).getTime();
    if(!tid || isNaN(ts)) return;
    if(!threads[tid]) threads[tid] = { msgs:[], guest: String(guest).trim() };
    const isAgent = dirRaw.includes('out');
    threads[tid].msgs.push({ ts, body, role: isAgent?'agent':'guest' });
  });
  if(!Object.keys(threads).length) return { error:'No threads found.' };
  const result = [];
  Object.entries(threads).forEach(([tid, th]) => {
    th.msgs.sort((a,b)=>a.ts-b.ts);
    let lastGuestTs=null, firstAgentTs=null, guestBlock=false;
    for(const msg of th.msgs){
      if(msg.role==='guest'){ lastGuestTs=msg.ts; guestBlock=true; firstAgentTs=null; }
      else if(guestBlock && lastGuestTs && !firstAgentTs){ firstAgentTs=msg.ts; guestBlock=false; }
    }
    const rt = firstAgentTs ? +((firstAgentTs - lastGuestTs)/60000).toFixed(1) : null;
    const breach = rt!=null ? rt > SLA.Hostaway : !firstAgentTs;
    const lastG = th.msgs.filter(m=>m.role==='guest').slice(-1)[0];
    result.push({
      id: 'ha_'+Date.now()+'_'+Math.random().toString(36).slice(2),
      agentId, channel:'Hostaway', guest: th.guest,
      message: lastG ? lastG.body : '',
      ts: lastG ? lastG.ts : Date.now(),
      intent:'Hostaway', urgency: breach?'high':'low',
      responded: firstAgentTs!=null, rt, breach
    });
  });
  return { messages: result, matched: res.data.length, threads: Object.keys(threads).length };
}

function syncAll(parsed, agentId, fileName, channel){
  const newMsgs=[], newBreaches=[];
  parsed.forEach(pm => {
    if(!store.messages.find(m=>m.id===pm.id)){
      store.messages.push(pm);
      newMsgs.push(pm);
    }
  });
  newMsgs.filter(m=>m.breach).forEach(b => {
    const entry = {
      agentId, agentName: agentName(agentId),
      guest:b.guest, channel:b.channel, msg:b.message,
      ts:b.ts, rt:b.rt,
      reason: b.rt!=null ? b.rt+'m > '+SLA[b.channel]+'m SLA' : 'No response'
    };
    if(!store.rootCause.find(r=>r.guest===b.guest&&Math.abs(r.ts-b.ts)<60000)){
      store.rootCause.push(entry);
      newBreaches.push(entry);
    }
  });
  recalcKPI();
  saveLocal();
  const logEntry = new Date().toLocaleString()+' — '+channel+' for '+agentName(agentId)+': '+parsed.length+' conversations from '+fileName;
  store.importLog.unshift(logEntry);
  showToast('Import complete');
  render(currentView);
}

function wireImport(){
  const waBtn=document.getElementById('waParseBtn');
  if(waBtn) waBtn.onclick=()=>{
    const agentId=document.getElementById('wa_agent')?.value;
    const file=document.getElementById('waFile')?.files[0];
    if(!agentId||!file) return;
    const agent=store.agents.find(a=>a.id===agentId);
    const rd=new FileReader();
    rd.onload=e=>{
      const result=parseWhatsApp(e.target.result, agent.waName, agentId, 'WhatsApp');
      if(result.error) return;
      syncAll(result.messages, agentId, file.name, 'WhatsApp');
    };
    rd.readAsText(file);
  };
  const haBtn=document.getElementById('haParseBtn');
  if(haBtn) haBtn.onclick=()=>{
    const agentId=document.getElementById('ha_agent')?.value;
    const file=document.getElementById('haFile')?.files[0];
    if(!agentId||!file) return;
    const rd=new FileReader();
    rd.onload=e=>{
      const result=parseHostaway(e.target.result, agentId, 'Hostaway');
      if(result.error) return;
      syncAll(result.messages, agentId, file.name, 'Hostaway');
    };
    rd.readAsText(file);
  };
}

function wireAdmin(){
  const clearBtn=document.getElementById('clearDataBtn');
  if(clearBtn) clearBtn.onclick=()=>{

      saveLocal();
      render(currentView);

// Auth integration
let currentUser = null;

function updateUIForUser() {
  const user = currentUser;
  const avatarEl = document.getElementById('userAvatar');
  const nameEl = document.getElementById('userDisplayName');
  const roleEl = document.getElementById('userDisplayRole');
  const sbPill = document.getElementById('sbPill');
  
  if (user && typeof user.name === 'string' && user.name.trim() !== '') {
    if (avatarEl) {
      const initials = user.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      avatarEl.textContent = initials || 'GC';
    }
    if (nameEl) nameEl.textContent = user.name;
    if (roleEl) roleEl.textContent = user.role === 'manager' ? 'Manager' : 'Agent';
    if (sbPill) sbPill.innerHTML = '<span class="pill p-green">Logged in</span>';
  } else {
    if (avatarEl) avatarEl.textContent = 'GC';
    if (nameEl) nameEl.textContent = 'Guest';
    if (roleEl) roleEl.textContent = 'Click to sign in';
    if (sbPill) sbPill.innerHTML = '<span class="pill p-gray">Not logged in</span>';
  }
}
